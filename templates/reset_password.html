{% extends "base.html" %}
{% block title %}Reset Password - Student Nation{% endblock %}

{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card border-0 shadow-lg rounded-4 p-5" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <i class="bi bi-key-fill text-primary mb-3" style="font-size: 60px;"></i>
            <h3 class="fw-bold text-dark mb-2">Reset Password</h3>
            <p class="text-muted">Enter your new password below. Ensure it is strong and secure.</p>
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small">New Password</label>
                <input type="password" name="password" class="form-control bg-light" required placeholder="••••••••">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control bg-light" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold fs-5 shadow-sm mb-3">
                Change Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
